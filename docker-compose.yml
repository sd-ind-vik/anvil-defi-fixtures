services:
  anvil-ethereum:
    build: .
    image: anvil-defi-fixtures:latest
    environment:
      CHAIN_NAME: ethereum
      RPC_PORT: "8545"
    ports:
      - "${ANVIL_ETHEREUM_PORT:-8545}:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://127.0.0.1:8545"]
      interval: 5s
      timeout: 3s
      retries: 12

  anvil-base:
    build: .
    image: anvil-defi-fixtures:latest
